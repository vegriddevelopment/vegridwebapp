{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>Update Partner Invoice - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; padding-bottom: 120px; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar-container { width: 250px; flex-shrink: 0; }
        .sidebar-item { padding: 10px 25px; border-bottom: 1px solid #eee; }
        .sidebar-link { text-decoration: none; color: #333; font-weight: 700; font-size: 0.95rem; display: block; }
        .main-content { flex: 1; padding: 40px; max-width: 1200px; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .header-logo { display: flex; flex-direction: column; align-items: flex-end; }
        .header-logo img { height: 50px; }
        .header-logo span { color: var(--vegrid-orange); font-weight: 900; font-size: 1rem; margin-top: -5px; }

        .update-box { border: 1.5px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .update-item { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .update-item:last-child { border-bottom: none; }
        .update-header { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; color: #333; margin-bottom: 5px; }
        .update-content { font-size: 0.85rem; color: #888; font-weight: 500; }
        
        .notes-section { margin-top: 40px; }
        .notes-label { font-weight: 700; color: #333; font-size: 1rem; margin-bottom: 10px; display: block; }
        .notes-textarea { width: 100%; height: 200px; border: 1.5px solid #eee; border-radius: 12px; padding: 15px; outline: none; }
        
        .action-btns { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn-black { background: #000; color: #fff; border: none; padding: 8px 45px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        {% include 'admin/sidebar.html' %}
        <div class="sidebar-container"></div>
        <div class="main-content">
        <header class="header">
            <div class="header-logo">
                <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
                <span>VEGRID</span>
            </div>
        </header>

        <h4 class="fw-bold mb-4">Partner Invoice Update: {{ reference }}</h4>

        <div class="update-box">
            {% for update in updates %}
            <div class="update-item">
                <div class="update-header">
                    <span>Date: {{ update.date }}</span>
                    <span>User: {{ update.user }}</span>
                </div>
                <div class="update-content">
                    {{ update.content }}
                </div>
            </div>
            {% endfor %}
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="notes-section">
                <label class="notes-label">Add Notes</label>
                <textarea class="notes-textarea" name="notes"></textarea>
            </div>

            <div class="action-btns">
                <button type="submit" class="btn-black">Submit</button>
                <a href="{% url 'admin-partner-invoices' %}" class="btn-black">Exit</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
