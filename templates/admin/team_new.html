{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>New Team Member - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; padding-bottom: 40px; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar-container { width: 250px; flex-shrink: 0; }
        .sidebar-item { padding: 10px 25px; border-bottom: 1px solid #eee; }
        .sidebar-link { text-decoration: none; color: #333; font-weight: 700; font-size: 0.95rem; display: block; }
        .main-content { flex: 1; padding: 40px; max-width: 1400px; }
        .header { display: flex; justify-content: center; margin-bottom: 30px; position: relative; }
        .header h1 { background: var(--vegrid-orange); color: #fff; padding: 10px 40px; border-radius: 4px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }
        .header-logo { position: absolute; right: 0; top: 0; display: flex; flex-direction: column; align-items: flex-end; }
        .header-logo img { height: 40px; }
        .header-logo span { color: var(--vegrid-orange); font-weight: 900; font-size: 0.8rem; margin-top: -5px; }

        .form-section { background: var(--vegrid-orange); border-radius: 12px; padding: 30px; height: 100%; color: #fff; }
        .section-title { font-weight: 700; font-size: 1rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .form-input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid #fff; color: #fff; padding: 5px 0; outline: none; }
        .form-input::placeholder { color: rgba(255,255,255,0.7); }
        .form-select { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid #fff; color: #fff; padding: 5px 0; outline: none; appearance: none; }
        .form-select option { color: #333; }

        .action-btns { display: flex; justify-content: space-between; gap: 15px; margin-top: 40px; }
        .btn-add { background: #fff; color: var(--vegrid-orange); border: none; flex: 1; padding: 10px 0; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; text-align: center; }
        .btn-exit { background: #000; color: #fff; border: none; flex: 1; padding: 10px 0; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; text-align: center; }
        .btn-white-upload { background: #fff; color: var(--vegrid-orange); border: none; padding: 5px 15px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.8rem; cursor: pointer; display: inline-block; }
        
        .footer-nav { 
            background: var(--vegrid-orange); 
            padding: 20px 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            border-top-left-radius: 30px; 
            border-top-right-radius: 30px; 
            position: fixed;
            bottom: 0;
            left: 250px;
            right: 0;
            z-index: 1000;
        }
        .footer-btn { background: #000; color: #fff; border: none; padding: 8px 40px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <div class="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <div class="main-content">
        <header class="header">
            <h1>New Team Member</h1>
            <div class="header-logo">
                <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
                <span>VEGRID</span>
            </div>
        </header>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="form-section">
                        <div class="section-title">Personal Details</div>
                        <div class="form-group">
                            <label class="form-label">First Name: *</label>
                            <input type="text" name="first_name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Middle Name:</label>
                            <input type="text" name="middle_name" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name: *</label>
                            <input type="text" name="last_name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ID Number: *</label>
                            <input type="text" name="id_number" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Kra Pin: *</label>
                            <input type="text" name="pin_number" class="form-input" required>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-section">
                        <div class="section-title">Contact Details</div>
                        <div class="form-group">
                            <label class="form-label">Contact Number: *</label>
                            <input type="text" name="contact" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address: *</label>
                            <input type="email" name="email" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Address (P.O Box): *</label>
                            <input type="text" name="address" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <select name="country" id="country-select" class="form-select" onchange="updateTowns()">
                                <option value=""></option>
                                <option value="Kenya">Kenya</option>
                                <option value="Uganda">Uganda</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Burundi">Burundi</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="DRC Congo">DRC Congo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Town</label>
                            <select name="town" id="town-select" class="form-select" style="max-height: 200px; overflow-y: auto;">
                                <option value="">Select Country First</option>
                            </select>
                        </div>
                    </div>
                </div>

                <script>
                    const locationData = {
                        "Kenya": [
                            "Nairobi", "Mombasa", "Kisumu", "Nakuru", "Eldoret", "Kehancha", "Ruiru", "Kikuyu", "Kangundo-Tala", "Malindi", "Naivasha", "Kitui", "Machakos", "Thika", "Athi River", "Karuri", "Nyeri", "Kilifi", "Garissa", "Vihiga", "Mumias", "Bomet", "Iten", "Kitale", "Limuru", "Kericho", "Kimilili", "Kakamega", "Kapsabet", "Mariakani", "Kiambu", "Mandera", "Nanyuki", "Narok", "Marsabit", "Lamu", "Wajir", "Lodwar", "Homa Bay", "Siaya", "Kapenguria", "Migori", "Kwale", "Ol Kalou", "Kerugoya", "Kutus", "Busia"
                        ],
                        "Uganda": [
                            "Kampala", "Nansana", "Kira", "Ssabagabo", "Mbarara", "Mukono", "Njeru", "Gulu", "Lugazi", "Kasese", "Masaka", "Entebbe", "Hoima", "Lira", "Mityana", "Mubende", "Masindi", "Mbale", "Jinja", "Kitgum", "Arua", "Koboko", "Soroti", "Iganga", "Busia", "Fort Portal", "Kumi", "Nebbi", "Kamuli"
                        ],
                        "Tanzania": [
                            "Dar es Salaam", "Mwanza", "Arusha", "Dodoma", "Mbeya", "Morogoro", "Tanga", "Kahama", "Tabora", "Zanzibar City", "Kigoma", "Sumbawanga", "Kasulu", "Songea", "Moshi", "Musoma", "Shinyanga", "Iringa", "Singida", "Njombe", "Bukoba", "Kibaha", "Mtwara", "Mpanda", "Tunduma", "Makambako", "Bariadi", "Geita", "Babati", "Lindi"
                        ],
                        "Burundi": [
                            "Bujumbura", "Gitega", "Ngozi", "Rumonge", "Kayanza", "Muyinga", "Ruyigi", "Makamba", "Kirundo", "Bururi", "Rutana", "Muramvya", "Cankuzo", "Bubanza", "Karuzi", "Cibitoke", "Mwaro"
                        ],
                        "Rwanda": [
                            "Kigali", "Gisenyi", "Ruhengeri", "Butare", "Gitarama", "Byumba", "Cyangugu", "Nyanza", "Bugarama", "Kayonza", "Rwamagana", "Kibungo", "Kibuye", "Gikongoro", "Umutara"
                        ],
                        "DRC Congo": [
                            "Kinshasa", "Lubumbashi", "Mbuji-Mayi", "Kananga", "Kisangani", "Bukavu", "Goma", "Likasi", "Tshikapa", "Kolwezi", "Matadi", "Mbandaka", "Butembo", "Kikwit", "Isiro", "Kindu", "Boma", "Kamina", "Gandajika", "Bandundu", "Gemena", "Kipushi", "Beni", "Muanda", "Zongo"
                        ]
                    };

                    function updateTowns() {
                        const countrySelect = document.getElementById('country-select');
                        const townSelect = document.getElementById('town-select');
                        const selectedCountry = countrySelect.value;

                        // Clear existing options
                        townSelect.innerHTML = '<option value=""></option>';

                        if (selectedCountry && locationData[selectedCountry]) {
                            locationData[selectedCountry].forEach(town => {
                                const option = document.createElement('option');
                                option.value = town;
                                option.textContent = town;
                                townSelect.appendChild(option);
                            });
                        } else {
                            const option = document.createElement('option');
                            option.value = "";
                            option.textContent = "Select Country First";
                            townSelect.appendChild(option);
                        }
                    }
                </script>

                <div class="col-md-4">
                    <div class="form-section">
                        <div class="section-title">Role Details</div>
                        <div class="form-group">
                            <label class="form-label">Role: *</label>
                            <select name="role" class="form-select" required>
                                <option value=""></option>
                                <option value="Admin">Admin</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Installer">Installer</option>
                                <option value="Site Surveyor">Site Surveyor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Qualification: *</label>
                            <input type="text" name="qualification" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Personal Documents: *</label>
                            <div class="d-flex align-items-center">
                                <label for="documents" class="btn-white-upload me-2">Upload</label>
                                <span id="documents-name" class="small"></span>
                            </div>
                            <input type="file" id="documents" name="documents" class="form-input" style="display:none;" onchange="document.getElementById('documents-name').innerText = this.files[0] ? this.files[0].name : ''">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Passport Photo: *</label>
                            <div class="d-flex align-items-center">
                                <label for="photo" class="btn-white-upload me-2">Upload</label>
                                <span id="photo-name" class="small"></span>
                            </div>
                            <input type="file" id="photo" name="photo" class="form-input" style="display:none;" accept="image/*" onchange="document.getElementById('photo-name').innerText = this.files[0] ? this.files[0].name : ''">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Registration Type</label>
                            <input type="text" name="registration_type" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Registration Number: *</label>
                            <input type="text" name="registration_number" class="form-input">
                        </div>

                        <div class="action-btns">
                            <button type="submit" class="btn-add">Add</button>
                            <a href="{% url 'admin-team' %}" class="btn-exit">Exit</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

    <footer class="footer-nav">
        <a href="{% url 'admin-notifications' %}" class="footer-btn">Notification</a>
        <a href="{% url 'admin-alerts' %}" class="footer-btn">Alerts</a>
        <a href="{% url 'admin-incidents' %}" class="footer-btn">Incidents</a>
    </footer>
</body>
</html>
