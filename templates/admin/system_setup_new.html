{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>New System Setup - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; padding-bottom: 40px; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar-container { 
            width: 250px; 
            flex-shrink: 0;
        }
        .main-content { flex: 1; padding: 40px; }
        .header { display: flex; justify-content: center; margin-bottom: 30px; position: relative; }
        .header h1 { background: var(--vegrid-orange); color: #fff; padding: 10px 40px; border-radius: 4px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }
        .header-logo { position: absolute; right: 0; top: 0; display: flex; flex-direction: column; align-items: flex-end; }
        .header-logo img { height: 40px; }
        .header-logo span { color: var(--vegrid-orange); font-weight: 900; font-size: 0.8rem; margin-top: -5px; }

        .form-section { background: var(--vegrid-orange); border-radius: 12px; padding: 30px; height: 100%; color: #fff; }
        .section-title { font-weight: 700; font-size: 1rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .form-input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid #fff; color: #fff; padding: 5px 0; outline: none; }
        .form-input::placeholder { color: rgba(255,255,255,0.7); }
        .form-select { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid #fff; color: #fff; padding: 5px 0; outline: none; appearance: none; cursor: pointer; }
        .form-select option { color: #333; background: #fff; }
        .form-select:focus { border-bottom-color: rgba(255,255,255,0.8); }

        .action-btns { display: flex; gap: 15px; margin-top: 40px; flex-direction: column; }
        .btn-save { 
            background: #fff; 
            color: var(--vegrid-orange); 
            border: none; 
            padding: 12px 30px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-decoration: none; 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background: #fdfdfd;
        }
        .btn-exit { 
            background: rgba(255,255,255,0.1);
            color: #fff; 
            border: 2px solid #fff; 
            padding: 10px 30px; 
            border-radius: 12px; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-exit:hover {
            background: #fff;
            color: var(--vegrid-orange);
            transform: translateY(-2px);
        }
        
        .footer-nav { background: var(--vegrid-orange); padding: 20px 40px; display: flex; justify-content: space-around; border-top-left-radius: 30px; border-top-right-radius: 30px; margin-top: 40px; }
        .footer-btn { background: #000; color: #fff; border: none; padding: 8px 40px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }
        
        .image-upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .image-upload-box { border: 1.5px dashed #fff; border-radius: 4px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .image-upload-box i { font-size: 1.2rem; z-index: 1; }
        .image-upload-box input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .image-upload-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: none; }
        
        .password-container { position: relative; width: 100%; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #fff; z-index: 10; font-size: 1.1rem; }
        .form-input-password { padding-right: 40px !important; }
    </style>
</head>
<body>
    <div class="main-content">
        <header class="header">
            <h1>New System Setup</h1>
            <div class="header-logo">
                <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
                <span>VEGRID</span>
            </div>
        </header>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-4">
                <!-- General Information -->
                <div class="col-md-3">
                    <div class="form-section">
                        <div class="section-title">General Information</div>
                        <div class="form-group">
                            <label class="form-label">PLANT NAME</label>
                            <input type="text" name="name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">COUNTRY</label>
                            <select name="country" id="country-select" class="form-select">
                                <option value="Kenya">Kenya</option>
                                <option value="Uganda">Uganda</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="Burundi">Burundi</option>
                                <option value="DRC Congo">DRC Congo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">REGION</label>
                            <select name="county" id="region-select" class="form-select">
                                <option value="Nairobi">Nairobi</option>
                                <option value="Mombasa">Mombasa</option>
                                <option value="Kisumu">Kisumu</option>
                                <option value="Nakuru">Nakuru</option>
                                <option value="Kiambu">Kiambu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">TOWN</label>
                            <select name="town" id="town-select" class="form-select">
                                <option value="Nairobi">Nairobi</option>
                                <option value="Mombasa">Mombasa</option>
                                <option value="Kisumu">Kisumu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">AREA</label>
                            <select name="area" id="area-select" class="form-select">
                                <option value="Runda">Runda</option>
                                <option value="Westlands">Westlands</option>
                                <option value="Karen">Karen</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">SERVICE AREA</label>
                            <input type="text" name="service_area" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">LOCATION</label>
                            <input type="text" name="location_address" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">COORDINATES <a href="#" id="view-map-link" style="color: rgba(255,255,255,0.8); margin-left: 10px; font-size: 0.75rem; text-decoration: underline;"><i class="bi bi-geo-alt"></i> View on Maps</a></label>
                            <input type="text" name="coordinates" id="coordinates-input" class="form-input" placeholder="-1.2345, 36.7890">
                        </div>
                        <div class="form-group">
                            <label class="form-label">TIME ZONE</label>
                            <input type="text" name="time_zone" id="timezone-input" class="form-input" placeholder="e.g. Africa/Nairobi">
                        </div>
                        <div class="form-group">
                            <label class="form-label">PLANT IMAGES (up to 6)</label>
                            <div class="image-upload-grid">
                                {% for i in "123456"|make_list %}
                                <div class="image-upload-box">
                                    <i class="bi bi-plus"></i>
                                    <input type="file" name="image_{{ i }}" accept="image/*" onchange="previewImage(this)">
                                    <img src="#" alt="Preview">
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- System Information -->
                <div class="col-md-3">
                    <div class="form-section">
                        <div class="section-title">System Information</div>
                        <div class="form-group">
                            <label class="form-label">INVERTER RATING (kVA)</label>
                            <select name="rating" class="form-select">
                                <option value="3">3</option>
                                <option value="5">5</option>
                                <option value="8">8</option>
                                <option value="12">12</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">INVERTER BRAND</label>
                            <input type="text" name="inverter_brand" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">INVERTER MODEL</label>
                            <input type="text" name="inverter_model" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">INVERTER SN</label>
                            <input type="text" name="device_sn" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">GENERATION (kWp)</label>
                            <input type="number" step="0.01" name="installed_capacity" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">STORAGE (kW)</label>
                            <input type="number" step="0.01" name="battery_capacity" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">BATTERY BRAND</label>
                            <input type="text" name="battery_brand" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Installation Information -->
                <div class="col-md-3">
                    <div class="form-section">
                        <div class="section-title">Installation Information</div>
                        <div class="form-group">
                            <label class="form-label">CUSTOMER</label>
                            <select name="customer_id" class="form-select" required>
                                <option value=""></option>
                                {% for customer in customers %}
                                <option value="{{ customer.id }}">{{ customer.user.get_full_name }} ({{ customer.customer_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">INSTALLER</label>
                            <select name="installer" class="form-select">
                                <option value=""></option>
                                {% for member in team_members %}
                                <option value="{{ member.first_name }} {{ member.last_name }}">{{ member.first_name }} {{ member.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">INSTALLATION ENGINEER</label>
                            <select name="installation_engineer" class="form-select">
                                <option value=""></option>
                                {% for member in team_members %}
                                <option value="{{ member.first_name }} {{ member.last_name }}">{{ member.first_name }} {{ member.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">INSTALLATION DATE</label>
                            <input type="datetime-local" name="installation_date" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Commission Information -->
                <div class="col-md-3">
                    <div class="form-section">
                        <div class="section-title">Commission Information</div>
                        <div class="form-group">
                            <label class="form-label">OWNER</label>
                            <select name="owner" class="form-select">
                                {% for customer in customers %}
                                <option value="{{ customer.user.get_full_name|default:customer.user.username }}">{{ customer.user.get_full_name|default:customer.user.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">FINANCIER:</label>
                            <select name="financier_type" id="financier-type" class="form-select">
                                <option value="Customer">Customer</option>
                                <option value="Bank">Bank</option>
                            </select>
                        </div>
                        <div class="form-group" id="financier-name-group">
                            <label class="form-label" id="financier-name-label">CUSTOMER NAME:</label>
                            <input type="text" name="financier_name" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">CURRENCY:</label>
                            <select name="currency" class="form-select">
                                <option value="Kes">Kes</option>
                                <option value="Usd">Usd</option>
                                <option value="Ugx">Ugx</option>
                                <option value="Tzs">Tzs</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">USER NAME:</label>
                            <input type="text" name="deye_username" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">PASSWORD:</label>
                            <div class="password-container">
                                <input type="password" name="deye_password" id="password_input" class="form-input form-input-password">
                                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">SERVICE REP:</label>
                            <select name="service_rep" class="form-select">
                                <option value=""></option>
                                {% for member in team_members %}
                                <option value="{{ member.first_name }} {{ member.last_name }}">{{ member.first_name }} {{ member.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="action-btns">
                            <button type="submit" class="btn-save">
                                <i class="bi bi-check2-circle"></i> Save Setup
                            </button>
                            <a href="{% url 'admin-sites' %}" class="btn-exit">
                                <i class="bi bi-x-circle"></i> Exit
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <footer class="footer-nav">
        <a href="{% url 'admin-notifications' %}" class="footer-btn">Notification</a>
        <a href="{% url 'admin-alerts' %}" class="footer-btn">Alerts</a>
        <a href="{% url 'admin-incidents' %}" class="footer-btn">Incidents</a>
    </footer>

    <script>
        // Auto-fill coordinates
        function fillCoordinates() {
            const coordInput = document.getElementById('coordinates-input');
            const timezoneInput = document.getElementById('timezone-input');

            // Detect timezone
            if (!timezoneInput.value) {
                try {
                    timezoneInput.value = Intl.DateTimeFormat().resolvedOptions().timeZone;
                } catch (e) {
                    console.error("Error detecting timezone:", e);
                }
            }

            if (!coordInput.value && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude.toFixed(6);
                    const lng = position.coords.longitude.toFixed(6);
                    coordInput.value = lat + ", " + lng;
                }, function(error) {
                    console.error("Error getting location: ", error.message);
                });
            }
        }
        window.addEventListener('load', fillCoordinates);

        // Financier type toggle
        const financierType = document.getElementById('financier-type');
        const financierNameLabel = document.getElementById('financier-name-label');
        
        if (financierType && financierNameLabel) {
            financierType.addEventListener('change', function() {
                if (this.value === 'Bank') {
                    financierNameLabel.textContent = 'BANK NAME';
                } else {
                    financierNameLabel.textContent = 'CUSTOMER NAME';
                }
            });
        }

        // Password visibility toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password_input');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function (e) {
                // toggle the type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                // toggle the eye slash icon
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }

        // Preview images
        function previewImage(input) {
            const box = input.parentElement;
            const img = box.querySelector('img');
            const icon = box.querySelector('i');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    icon.style.display = 'none';
                    box.style.border = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // View on Maps redirect
        document.getElementById('view-map-link').addEventListener('click', function(e) {
            e.preventDefault();
            const coordVal = document.getElementById('coordinates-input').value.trim();
            const url = coordVal 
                ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(coordVal)}`
                : 'https://www.google.com/maps';
            window.open(url, '_blank');
        });

        const regionMapping = {
            "Kenya": [
                "Nairobi City", "Mombasa", "Kwale", "Kilifi", "Tana River", "Lamu", "Taita Taveta", "Garissa", "Wajir", "Mandera", "Marsabit", "Isiolo", "Meru", "Tharaka-Nithi", "Embu", "Kitui", "Machakos", "Makueni", "Nyandarua", "Nyeri", "Kirinyaga", "Murang'a", "Kiambu", "Turkana", "West Pokot", "Samburu", "Trans Nzoia", "Uasin Gishu", "Elgeyo-Marakwet", "Nandi", "Baringo", "Laikipia", "Nakuru", "Narok", "Kajiado", "Kericho", "Bomet", "Kakamega", "Vihiga", "Bungoma", "Busia", "Siaya", "Kisumu", "Homa Bay", "Migori", "Kisii", "Nyamira"
            ],
            "Uganda": [
                "Abim", "Adjumani", "Agago", "Alebtong", "Amolatar", "Amudat", "Amuria", "Amuru", "Apac", "Arua", "Budaka", "Bududa", "Bugiri", "Bugweri", "Buhweju", "Buikwe", "Bukedea", "Bukomansimbi", "Bukwo", "Bulambuli", "Buliisa", "Bundibugyo", "Bunyangabu", "Bushenyi", "Busia", "Butaleja", "Butambala", "Butebo", "Buvuma", "Buyende", "Dokolo", "Gomba", "Gulu", "Hoima", "Ibanda", "Iganga", "Isingiro", "Jinja", "Kaabong", "Kabale", "Kabarole", "Kaberamaido", "Kagadi", "Kakumiro", "Kalangala", "Kaliro", "Kalungu", "Kampala", "Kamuli", "Kamwenge", "Kanungu", "Kapchorwa", "Kapelebyong", "Kasanda", "Kasese", "Katakwi", "Kayunga", "Kibaale", "Kiboga", "Kibuku", "Kigezi", "Kiruhura", "Kiryandongo", "Kisoro", "Kween", "Kyankwanzi", "Kyegegwa", "Kyenjojo", "Kyotera", "Lamwo", "Lira", "Luuka", "Luwero", "Lwengo", "Lyantonde", "Madi Okollo", "Manafwa", "Maracha", "Masaka", "Masindi", "Mayuge", "Mbale", "Mbarara", "Mitooma", "Mityana", "Moroto", "Moyo", "Mpigi", "Mubende", "Mukono", "Nabilatuk", "Nakapiripirit", "Nakaseke", "Nakasongola", "Namayingo", "Namisindwa", "Namutumba", "Napak", "Nebbi", "Ngora", "Ntoroko", "Ntungamo", "Nwoya", "Obongi", "Omoro", "Otuke", "Oyam", "Pader", "Pakwach", "Pallisa", "Rakai", "Rubanda", "Rubirizi", "Rukiga", "Rukungiri", "Rwampala", "Sembabule", "Serere", "Sheema", "Sironko", "Soroti", "Tororo", "Wakiso", "Yumbe", "Zombo"
            ],
            "Tanzania": [
                "Arusha", "Dar es Salaam", "Dodoma", "Geita", "Iringa", "Kagera", "Katavi", "Kigoma", "Kilimanjaro", "Lindi", "Manyara", "Mara", "Mbeya", "Morogoro", "Mtwara", "Mwanza", "Njombe", "Pemba North", "Pemba South", "Pwani", "Rukwa", "Ruvuma", "Shinyanga", "Simiyu", "Singida", "Songwe", "Tabora", "Tanga", "Zanzibar North", "Zanzibar South", "Zanzibar West"
            ],
            "Rwanda": [
                "Gasabo", "Kicukiro", "Nyarugenge", "Burera", "Gakenke", "Gicumbi", "Musanze", "Rulindo", "Gisagara", "Huye", "Kamonyi", "Muhanga", "Nyamagabe", "Nyanza", "Nyaruguru", "Ruhango", "Bugesera", "Gatsibo", "Kayonza", "Kirehe", "Ngoma", "Nyagatare", "Rwamagana", "Karongi", "Ngororero", "Nyabihu", "Nyamasheke", "Rubavu", "Rusizi", "Rutsiro"
            ],
            "Burundi": [
                "Bubanza", "Bujumbura Mairie", "Bujumbura Rural", "Bururi", "Cankuzo", "Cibitoke", "Gitega", "Karuzi", "Kayanza", "Kirundo", "Makamba", "Muramvya", "Muyinga", "Mwaro", "Ngozi", "Rumonge", "Rutana", "Ruyigi"
            ],
            "DRC Congo": [
                "Bas-Uele", "Equateur", "Haut-Katanga", "Haut-Lomami", "Haut-Uele", "Ituri", "Kasai", "Kasai-Central", "Kasai-Oriental", "Kinshasa", "Kongo Central", "Kwango", "Kwilu", "Lomami", "Lualaba", "Mai-Ndombe", "Maniema", "Mongala", "Nord-Kivu", "Nord-Ubangi", "Sankuru", "Sud-Kivu", "Sud-Ubangi", "Tanganyika", "Tshopo", "Tshuapa"
            ]
        };

        const countrySelect = document.getElementById('country-select');
        const regionSelect = document.getElementById('region-select');
        const townSelect = document.getElementById('town-select');
        const areaSelect = document.getElementById('area-select');

        const townMapping = {
            // Kenya
            "Nairobi City": ["Nairobi", "Westlands", "Dagoretti", "Lang'ata", "Kibra", "Roysambu", "Kasarani", "Ruaraka", "Embakasi", "Makadara", "Kamkunji", "Starehe", "Mathare"],
            "Mombasa": ["Mombasa", "Nyali", "Likoni", "Kisauni", "Changamwe", "Jomvu"],
            "Kwale": ["Kwale", "Ukunda", "Msambweni", "Lunga Lunga", "Kinango"],
            "Kilifi": ["Kilifi", "Malindi", "Watamu", "Mtwapa", "Mariakani", "Kaloleni"],
            "Kiambu": ["Kiambu", "Thika", "Limuru", "Kikuyu", "Ruiru", "Karuri", "Githunguri", "Juja"],
            "Nakuru": ["Nakuru", "Naivasha", "Molo", "Gilgil", "Njoro", "Mai Mahiu"],
            "Uasin Gishu": ["Eldoret", "Burnt Forest", "Turbo", "Moiben"],
            "Kisumu": ["Kisumu", "Ahero", "Muhoroni", "Maseno"],
            "Machakos": ["Machakos", "Athi River", "Kangundo", "Tala", "Matuu"],
            "Kajiado": ["Kajiado", "Ngong", "Kitengela", "Isinya", "Namanga", "Loitokitok"],
            // Uganda
            "Kampala": ["Kampala Central", "Nakawa", "Makindye", "Kawempe", "Rubaga"],
            "Wakiso": ["Wakiso", "Entebbe", "Nansana", "Kira", "Makindye Ssabagabo"],
            "Jinja": ["Jinja", "Bugembe", "Kakira"],
            "Mbarara": ["Mbarara", "Bwizibwera"],
            // Tanzania
            "Dar es Salaam": ["Ilala", "Kinondoni", "Temeke", "Kigamboni", "Ubungo"],
            "Arusha": ["Arusha", "Moshono", "Ngaramtoni"],
            "Mwanza": ["Mwanza", "Nyamagana", "Ilemela"],
            // Rwanda
            "Gasabo": ["Kacyiru", "Kimironko", "Remera", "Gisozi"],
            "Nyarugenge": ["Nyamirambo", "Kigali City Center", "Muhima"],
            // Burundi
            "Bujumbura Mairie": ["Rohero", "Nyakabiga", "Bwiza", "Buyenzi"],
            // DRC
            "Kinshasa": ["Gombe", "Limete", "Ngaliema", "Kalamu", "Barumbu"]
        };

        const areaMapping = {
            // Nairobi
            "Westlands": ["Parklands", "Highridge", "Kitisuru", "Mountain View", "Kangemi"],
            "Lang'ata": ["Karen", "South C", "Nairobi West", "Madaraka"],
            "Dagoretti": ["Lavington", "Kileleshwa", "Kilimani", "Kawangware"],
            "Embakasi": ["South B", "Imara Daima", "Nyayo Estate", "Syokimau"],
            "Kasarani": ["Roysambu", "Garden Estate", "Thome"],
            // Mombasa
            "Nyali": ["Links Road", "Cinemax", "Mkomani"],
            "Mombasa": ["CBD", "Old Town", "Ganjoni"],
            // Kiambu
            "Kikuyu": ["Sigona", "Zambezi", "Ondiri"],
            "Thika": ["Ngoingwa", "Section 9", "Makongeni"],
            "Ruiru": ["Kimbo", "Gatongora", "Kahawa Sukari", "Kahawa Wendani"]
        };

        function updateRegions() {
            const country = countrySelect.value;
            const regions = regionMapping[country] || [];
            
            regionSelect.innerHTML = '';
            regions.forEach(region => {
                const option = document.createElement('option');
                option.value = region;
                option.textContent = region;
                regionSelect.appendChild(option);
            });
            updateTowns();
        }

        function updateTowns() {
            const region = regionSelect.value;
            const towns = townMapping[region] || [region];
            
            townSelect.innerHTML = '';
            towns.forEach(town => {
                const option = document.createElement('option');
                option.value = town;
                option.textContent = town;
                townSelect.appendChild(option);
            });
            updateAreas();
        }

        function updateAreas() {
            const town = townSelect.value;
            const areas = areaMapping[town] || [town];
            
            areaSelect.innerHTML = '';
            areas.forEach(area => {
                const option = document.createElement('option');
                option.value = area;
                option.textContent = area;
                areaSelect.appendChild(option);
            });
        }

        countrySelect.addEventListener('change', updateRegions);
        regionSelect.addEventListener('change', updateTowns);
        townSelect.addEventListener('change', updateAreas);
        
        window.addEventListener('DOMContentLoaded', updateRegions);
    </script>
</body>
</html>
