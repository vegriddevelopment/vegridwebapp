{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>New Incident - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; padding-bottom: 120px; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar-container { width: 250px; flex-shrink: 0; }
        .sidebar-item { padding: 10px 25px; border-bottom: 1px solid #eee; }
        .sidebar-link { text-decoration: none; color: #333; font-weight: 700; font-size: 0.95rem; display: block; }
        .main-content { flex: 1; padding: 40px; max-width: 1200px; }
        .header { display: flex; justify-content: center; margin-bottom: 30px; position: relative; }
        .header h1 { background: var(--vegrid-orange); color: #fff; padding: 10px 40px; border-radius: 4px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }
        .header-logo { position: absolute; right: 0; top: 0; display: flex; flex-direction: column; align-items: flex-end; }
        .header-logo img { height: 40px; }
        .header-logo span { color: var(--vegrid-orange); font-weight: 900; font-size: 0.8rem; margin-top: -5px; }

        .info-row { border: 1.5px solid #333; padding: 10px 20px; display: flex; justify-content: space-between; margin-bottom: 30px; border-radius: 4px; }
        .info-item { font-weight: 700; font-size: 0.85rem; color: #333; display: flex; align-items: center; }
        .info-label { margin-right: 5px; }
        .info-value { color: #888; }
        
        .form-select { border: none; background: transparent; color: #888; font-weight: 700; outline: none; padding: 0; cursor: pointer; }
        
        .notes-section { margin-top: 40px; }
        .notes-label { font-weight: 700; color: #333; font-size: 1rem; margin-bottom: 10px; display: block; }
        .notes-textarea { width: 100%; height: 250px; border: 1.5px solid #eee; border-radius: 4px; padding: 15px; outline: none; }
        
        .action-btns { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn-black { background: #000; color: #fff; border: none; padding: 8px 45px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }

        .footer-nav { position: fixed; bottom: 0; left: 250px; right: 0; background: var(--vegrid-orange); padding: 20px 40px; display: flex; justify-content: center; gap: 50px; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 1001; }
        .footer-btn { background: #000; color: #fff; border: none; padding: 8px 40px; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        {% include 'admin/sidebar.html' %}
        <div class="sidebar-container"></div>
        <div class="main-content">
        <header class="header">
            <h1>New Incident</h1>
            <div class="header-logo">
                <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
                <span>VEGRID</span>
            </div>
        </header>

        <form method="POST">
            {% csrf_token %}
            <div class="info-row">
                <div class="info-item"><span class="info-label">DATE:</span> <span class="info-value">{% now "d.m.Y" %}</span></div>
                <div class="info-item"><span class="info-label">SENDER:</span> <span class="info-value">{{ user.get_full_name|default:user.username }}</span></div>
                <div class="info-item"><span class="info-label">INCIDENT TYPE:</span> 
                    <select name="incident_type" class="form-select ms-1">
                        <option value="Service">Service</option>
                        <option value="Payment">Payment</option>
                        <option value="Billing">Billing</option>
                        <option value="Installation">Installation</option>
                        <option value="Technical">Technical</option>
                    </select>
                </div>
                <div class="info-item"><span class="info-label">RECIPIENT TYPE:</span>
                    <select name="recipient_type" class="form-select ms-1">
                        <option value="Customer">Customer</option>
                        <option value="Vegrid">Vegrid</option>
                        <option value="Installer">Installer</option>
                    </select>
                </div>
                <div class="info-item"><span class="info-label">RECIPIENT:</span>
                    <select name="customer_id" class="form-select ms-1">
                        <option value="">Select Recipient</option>
                        {% for customer in customers %}
                        <option value="{{ customer.id }}">{{ customer.user.get_full_name|default:customer.user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="info-item"><span class="info-label">STATUS:</span> <span class="info-value">New</span></div>
            </div>

            <div class="notes-section">
                <label class="notes-label">Add Notes</label>
                <textarea name="message" class="notes-textarea" required></textarea>
            </div>

            <div class="action-btns">
                <button type="submit" class="btn-black">Submit</button>
                <a href="{% url 'admin-incidents' %}" class="btn-black">Exit</a>
            </div>
        </form>
    </div>
</div>

    <footer class="footer-nav">
        <a href="{% url 'admin-notifications' %}" class="footer-btn">Notification</a>
        <a href="{% url 'admin-alerts' %}" class="footer-btn">Alerts</a>
        <a href="{% url 'admin-incidents' %}" class="footer-btn">Incidents</a>
    </footer>
</body>
</html>
