{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>Verify OTP - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .otp-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { height: 50px; }
        .logo span { display: block; color: var(--vegrid-orange); font-weight: 900; font-size: 1.2rem; }
        .btn-orange { background: var(--vegrid-orange); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: 700; }
        .form-label { font-weight: 600; color: #333; text-align: center; display: block; }
        .error-msg { color: #dc3545; font-size: 0.9rem; margin-bottom: 15px; }
        .otp-input { text-align: center; font-size: 1.5rem; letter-spacing: 10px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="otp-card">
        <div class="logo">
            <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
            <span>VEGRID</span>
        </div>
        <h4 class="text-center mb-4">OTP Verification</h4>
        <p class="text-muted text-center mb-4">An OTP has been sent to your registered email and phone number. Please enter it below to complete your registration.</p>
        
        {% if error %}
        <div class="error-msg text-center">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label mb-3">Enter 6-digit OTP</label>
                <input type="text" name="otp_code" class="form-control otp-input" maxlength="6" required>
            </div>
            <button type="submit" class="btn-orange">Verify and Complete</button>
        </form>
    </div>
</body>
</html>
