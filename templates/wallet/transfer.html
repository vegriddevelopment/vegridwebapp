{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>Transfer Funds - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; }
        .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 10px; font-weight: 600; color: #555; }
        .header-logo img { height: 40px; }
        .header-logo .brand { color: var(--vegrid-orange); font-weight: 800; font-size: 0.8rem; display: block; margin-top: -5px; }
        .content { padding: 0 30px; text-align: center; }
        .page-title { background-color: var(--vegrid-orange); color: white; padding: 10px 30px; border-radius: 8px; display: inline-block; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }
        
        .balance-item { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; font-weight: 700; color: #444; font-size: 0.9rem; }
        
        .form-container { margin-top: 30px; }
        .form-control { border-radius: 10px; border: 1px solid #ccc; padding: 10px 15px; margin-bottom: 10px; font-size: 0.95rem; color: #666; }
        .form-select { border-radius: 10px; border: 1px solid #ccc; padding: 10px 15px; margin-bottom: 10px; font-size: 0.95rem; color: #666; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23f59120' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 16px 12px; }

        .action-buttons { display: flex; justify-content: space-between; margin-top: 100px; }
        .btn-black { background-color: #000; color: white; padding: 8px 30px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 0.9rem; border: none; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--vegrid-orange); display: flex; justify-content: space-around; padding: 15px 0; border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .nav-item { color: white; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 600; }
        .nav-icon-box { border: 1px solid rgba(255,255,255,0.5); padding: 8px; border-radius: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><div class="menu-toggle"><i class="bi bi-list"></i></div><span>AwaGrid</span></div>
        <div class="header-logo"><img src="{% static 'sun-logo.png' %}" alt="Sun Logo"><span class="brand">VEGRID</span></div>
    </div>

    <div class="content">
        <div class="page-title">WALLET TRANSACTION</div>

        <div class="balance-container">
            <div class="balance-item"><p>Current Balance {{ wallet.current_balance }}</p> <i class="bi bi-eye"></i></div>
            <div class="balance-item"><p>Available Balance {{ wallet.available_balance }}</p> <i class="bi bi-eye"></i></div>
        </div>

        <form method="POST" class="form-container">
            {% csrf_token %}
            <select name="type" class="form-select">
                <option selected>Transaction Type: Transfer</option>
            </select>
            <input type="text" name="destination" class="form-control" placeholder="Destination: Bank/Mpesa" value="Bank/Mpesa">
            <input type="text" name="number" class="form-control" placeholder="Destination Number: +254000000000" value="+254000000000">
            <input type="text" name="amount" class="form-control" placeholder="Amount: 15,000.00">

            <div class="action-buttons">
                <button type="submit" class="btn-black">Transfer</button>
                <a href="{% url 'wallet-dashboard' %}" class="btn-black">Exit</a>
            </div>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'dashboard' %}?open=notifications" class="nav-item"><div class="nav-icon-box"><i class="bi bi-bell"></i></div>NOTIFICATIONS</a>
        <a href="{% url 'dashboard' %}?open=alerts" class="nav-item"><div class="nav-icon-box"><i class="bi bi-briefcase"></i></div>ALERTS</a>
        <a href="{% url 'dashboard' %}?open=incidents" class="nav-item"><div class="nav-icon-box"><i class="bi bi-gear"></i></div>INCIDENTS</a>
    </div>
</body>
</html>
