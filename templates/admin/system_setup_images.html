{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{% static 'vegrid-logo-BBC4G70n.ico' %}" />
<title>Plant Images - {{ site.name }} - VEGRID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vegrid-orange: #f59120; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; padding-bottom: 40px; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar-container { width: 250px; flex-shrink: 0; }
        .main-content { flex: 1; padding: 40px; max-width: 1400px; }
        .header { display: flex; justify-content: center; margin-bottom: 30px; position: relative; }
        .header h1 { background: var(--vegrid-orange); color: #fff; padding: 10px 40px; border-radius: 4px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }
        .header-logo { position: absolute; right: 0; top: 0; display: flex; flex-direction: column; align-items: flex-end; }
        .header-logo img { height: 40px; }
        .header-logo span { color: var(--vegrid-orange); font-weight: 900; font-size: 0.8rem; margin-top: -5px; }

        .image-card { background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 30px; }
        .card-header { background: var(--vegrid-orange); color: #fff; padding: 15px 30px; font-weight: 700; font-size: 1rem; text-transform: uppercase; border: none; }
        .card-body { padding: 30px; }
        
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .image-box { border-radius: 12px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: transform 0.3s ease; }
        .image-box:hover { transform: scale(1.02); }
        .image-box img { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        
        .btn-back { 
            background: #fff; 
            color: #666; 
            border: 2px solid #ddd; 
            padding: 12px 40px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-back:hover { background: #f8f9fa; color: #333; transform: translateY(-2px); border-color: #bbb; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <div class="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <div class="main-content">
        <header class="header">
            <h1>Plant Images: {{ site.name }}</h1>
            <div class="header-logo">
                <img src="{% static 'sun-logo.png' %}" alt="Sun Logo">
                <span>VEGRID</span>
            </div>
        </header>

        <div class="image-card">
            <div class="card-header">Uploaded Site Images</div>
            <div class="card-body">
                <div class="images-grid">
                    {% for img in site.images.all %}
                    <div class="image-box">
                        <a href="{{ img.image.url }}" target="_blank">
                            <img src="{{ img.image.url }}" alt="Plant Image {{ forloop.counter }}">
                        </a>
                    </div>
                    {% empty %}
                    <div class="text-center py-5 w-100">
                        <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-3">No images have been uploaded for this site yet.</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'admin-system-setup-preview' site.id %}" class="btn-back">
                <i class="bi bi-arrow-left"></i> Back to Preview
            </a>
        </div>
    </div>
</div>
</body>
</html>
